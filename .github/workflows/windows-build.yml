name: 🪟 构建 Windows 应用

on:
  workflow_dispatch:
  push:  # 每次 push 到仓库时触发
    tags:
      - 'v*'   # 指定触发分支

jobs:
  build:
    runs-on: windows-latest

    # 调整 GITHUB_TOKEN 的权限
    permissions:
      contents: write  # 允许写入仓库内容（上传文件）
      packages: write
    
    env:
      FLUTTER_VERSION: main
      FLUTTER_CHANNEL: main
      RUST_VERSION: 1.89.0
      
    steps:
      - name: 🛠️ 检出代码仓库
        uses: actions/checkout@v4

        # 安装 Rust
      - name: 🦀 安装 Rust ${{ env.RUST_VERSION }}
        run: |
          & "$env:GITHUB_WORKSPACE\scripts\install_rust.ps1"
        shell: pwsh

      # 安装Flutter
      - name: 🐦 安装Flutter
        run: |
          & "$env:GITHUB_WORKSPACE\scripts\install_flutter.ps1"
        shell: pwsh

      # 安装 Flutter 依赖
      - name: 📦 安装 Flutter 依赖
        run: |
          echo "正在获取 Flutter 依赖..."
          flutter pub get
          echo "Flutter 依赖安装完成！"
        shell: pwsh

      - name: 📦 安装 Protobuf 编译器 (protoc)
        run: |
          choco install protoc -y
          protoc --version
        shell: pwsh

      - name: 📦 安装 Npcap SDK（提供 Packet.lib / wpcap.lib）
        run: |
          $sdkVer = "1.16"
          $zip = Join-Path $env:RUNNER_TEMP "npcap-sdk.zip"
          $dst = Join-Path $env:GITHUB_WORKSPACE "third_party/npcap-sdk"
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-$sdkVer.zip" -OutFile $zip
          if (Test-Path $dst) { Remove-Item -Recurse -Force $dst }
          New-Item -ItemType Directory -Force -Path (Split-Path $dst) | Out-Null
          Expand-Archive -Path $zip -DestinationPath $dst -Force

          $libDir = Join-Path $dst "Lib\\x64"
          if (!(Test-Path $libDir)) { throw "Npcap SDK lib dir not found: $libDir" }
          if (!(Test-Path (Join-Path $libDir "Packet.lib"))) { throw "Packet.lib not found in: $libDir" }
          if (!(Test-Path (Join-Path $libDir "wpcap.lib"))) { throw "wpcap.lib not found in: $libDir" }

          # GITHUB_ENV must be UTF-8 without BOM; rust/build.rs also reads NPCAP_SDK_LIB.
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          $append = {
            param([string]$Line)
            [System.IO.File]::AppendAllText($env:GITHUB_ENV, "$Line`n", $utf8NoBom)
          }
          & $append "LIB=$libDir;$env:LIB"
          & $append "NPCAP_SDK_LIB=$libDir"
          Write-Host "Npcap SDK lib configured at $libDir"
        shell: pwsh

      # 编译 Flutter Windows 应用
      - name: 🛠️ 编译 Flutter Windows 应用
        run: |
          echo "正在编译 Flutter Windows Release 版本..."
          flutter build windows --release
          echo "Flutter Windows Release 编译完成！"
        shell: pwsh


      # 复制 DLL 文件到输出目录
      - name: 📂 复制 DLL 文件到 Release 目录
        run: |
          echo "正在复制 DLL 文件到 Release 目录..."
          $dllSourceDir = "$env:GITHUB_WORKSPACE\dlls"
          $releaseDir = "$env:GITHUB_WORKSPACE\build\windows\x64\runner\Release"
          Copy-Item -Path "$dllSourceDir\*" -Destination $releaseDir -Recurse -Force
          echo "DLL 文件已复制到 $releaseDir！"

      # 压缩 Release 目录
      - name: 📦 压缩 Release 目录
        run: |
          echo "正在压缩 Release 目录..."
          $releaseDir = "$env:GITHUB_WORKSPACE\build\windows\x64\runner\Release"
          $zipFile = "$env:GITHUB_WORKSPACE\astral-windows-x64-zip.zip"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $zipFile -Force
          echo "Release 目录已压缩为 $zipFile！"

      # 上传压缩后的 Release 目录作为 Artifact
      - name: 📤 上传压缩后的 Release 目录
        uses: actions/upload-artifact@v4
        with:
          name: astral-windows-x64-zip
          path: ${{ github.workspace }}/astral-windows-x64-zip.zip
